name: Delete model deployment

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Model folder name (e.g., bge-m3-6)"
        required: true
      environment:
        description: "Environment"
        required: true
        default: "dev"

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate input
        run: |
          if [[ ! "${{ github.event.inputs.model_name }}" =~ ^[a-zA-Z0-9-]+$ ]]; then
            echo "Invalid model name"
            exit 1
          fi

      - name: Delete model folder
        run: |
          MODEL="${{ github.event.inputs.model_name }}"
          ENV="${{ github.event.inputs.environment }}"
          TARGET="apps/models/${ENV}/${MODEL}"

          if [ ! -d "$TARGET" ]; then
            echo "Model folder does not exist: $TARGET"
            exit 1
          fi

          rm -rf "$TARGET"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Delete model ${{ github.event.inputs.model_name }}"
          branch: "delete-${{ github.event.inputs.environment }}-${{ github.event.inputs.model_name }}"
          base: "main"
          title: "Delete model ${{ github.event.inputs.model_name }}"
          body: |
            Delete model folder:
            apps/models/${{ github.event.inputs.environment }}/${{ github.event.inputs.model_name }}

            This will trigger Flux to prune the deployment.