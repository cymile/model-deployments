name: Update dev kustomization

on:
  push:
    branches: [main]
    paths:
      - 'apps/models/dev/**'
      - 'scripts/generate-dev-kustomization.sh'

permissions:
  contents: write

jobs:
  update-kustomization:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate parent kustomization
        run: ./scripts/generate-dev-kustomization.sh

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps/models/dev/kustomization.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update apps/models/dev/kustomization.yaml"
          git push